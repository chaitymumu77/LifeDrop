<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeDrop - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav"></div>

  <section class="section" style="min-height:80vh;display:flex;align-items:center;">
    <div class="container" style="max-width:460px;">
      <div class="card fade-in">
        <div style="background:var(--red);padding:2rem;text-align:center;color:white;">
          <div style="font-size:2.5rem;">🩸</div>
          <h2 style="font-family:'Playfair Display',serif;margin-top:0.5rem;">Welcome Back</h2>
          <p style="opacity:0.85;font-size:0.875rem;">Sign in to manage your donor profile</p>
        </div>
        <div class="card-body" style="padding:2rem;">
          <!-- Tabs -->
          <div style="display:flex;background:var(--light);border-radius:8px;padding:4px;margin-bottom:1.5rem;">
            <button id="tabUser" onclick="switchTab('user')" style="flex:1;padding:0.5rem;border:none;border-radius:6px;font-weight:600;cursor:pointer;background:white;color:var(--red);box-shadow:0 1px 4px rgba(0,0,0,0.1);">User Login</button>
            <button id="tabAdmin" onclick="switchTab('admin')" style="flex:1;padding:0.5rem;border:none;border-radius:6px;font-weight:600;cursor:pointer;background:transparent;color:var(--gray);">Admin Login</button>
          </div>

          <div id="errMsg" style="display:none;" class="alert alert-danger"></div>

          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input class="form-control" id="email" type="email" placeholder="Enter email">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-control" id="password" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
          </div>

          <div id="adminHint" style="display:none;" class="alert alert-info" style="margin-bottom:1rem;">
            Demo Admin: <strong>admin@lifedrop.com</strong> / <strong>password123</strong>
          </div>
          <div id="userHint" style="display:none;" class="alert alert-info">
            Demo User: <strong>donor@lifedrop.com</strong> / <strong>password123</strong>
          </div>

          <button class="btn btn-primary" style="width:100%;padding:0.75rem;font-size:1rem;margin-top:0.5rem;" onclick="doLogin()">Sign In →</button>

          <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);font-size:0.875rem;color:var(--gray);">
            Not registered? <a href="register.html" style="color:var(--red);font-weight:600;text-decoration:none;">Create Donor Account</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="foot"></div>
  <script src="js/data.js"></script>
  <script>
    document.getElementById('nav').innerHTML = navHTML('login');
    document.getElementById('foot').innerHTML = footerHTML();

    // Redirect if already logged in
    const sess = JSON.parse(localStorage.getItem('lifeDropUser') || 'null');
    if (sess) window.location.href = sess.role === 'admin' ? 'dashboard.html' : 'profile.html';

    let currentTab = 'user';
    document.getElementById('userHint').style.display = 'block';

    function switchTab(tab) {
      currentTab = tab;
      const isAdmin = tab === 'admin';
      document.getElementById('tabUser').style.cssText = isAdmin ? 'flex:1;padding:0.5rem;border:none;border-radius:6px;font-weight:600;cursor:pointer;background:transparent;color:var(--gray);' : 'flex:1;padding:0.5rem;border:none;border-radius:6px;font-weight:600;cursor:pointer;background:white;color:var(--red);box-shadow:0 1px 4px rgba(0,0,0,0.1);';
      document.getElementById('tabAdmin').style.cssText = isAdmin ? 'flex:1;padding:0.5rem;border:none;border-radius:6px;font-weight:600;cursor:pointer;background:white;color:var(--red);box-shadow:0 1px 4px rgba(0,0,0,0.1);' : 'flex:1;padding:0.5rem;border:none;border-radius:6px;font-weight:600;cursor:pointer;background:transparent;color:var(--gray);';
      document.getElementById('adminHint').style.display = isAdmin ? 'block' : 'none';
      document.getElementById('userHint').style.display = isAdmin ? 'none' : 'block';
    }

    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;

      if (!email || !pass) { showErr('Please enter email and password.'); return; }

      // Demo credentials
      if (currentTab === 'admin') {
        if (email === 'admin@lifedrop.com' && pass === 'password123') {
          localStorage.setItem('lifeDropUser', JSON.stringify({ role: 'admin', name: 'Admin', email }));
          window.location.href = 'dashboard.html';
        } else { showErr('Invalid admin credentials. Use: admin@lifedrop.com / password123'); }
      } else {
        if (email === 'donor@lifedrop.com' && pass === 'password123') {
          localStorage.setItem('lifeDropUser', JSON.stringify({ role: 'user', name: 'Rahim Uddin', email, donorId: 1 }));
          window.location.href = 'profile.html';
        } else { showErr('Invalid credentials. Use: donor@lifedrop.com / password123'); }
      }
    }

    function showErr(msg) {
      const el = document.getElementById('errMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
